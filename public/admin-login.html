<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hillfort Matriculation Higher Secondary School admin login." />
  <title>Admin Login | Hillfort Matriculation Higher Secondary School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <style>
    body.admin-auth-body {
      background: #2E7D5C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .admin-page {
      width: 100%;
      max-width: 400px;
    }

    .admin-login-card {
      background: white;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .admin-login-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.25rem;
    }

    .admin-login-brand img {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 10px 20px rgba(46, 125, 92, 0.18);
    }

    .admin-login-brand-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .admin-login-brand-text strong {
      color: #1d2433;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .admin-login-brand-text span {
      color: #657083;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .admin-login-card .eyebrow {
      color: #2E7D5C;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .admin-login-card h1 {
      color: #333;
      margin: 0.75rem 0 0.5rem;
      font-size: 1.75rem;
    }

    .admin-login-card > p {
      color: #666;
      margin: 1rem 0;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .admin-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .admin-login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .admin-login-form label {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-weight: 500;
      color: #333;
      font-size: 0.9rem;
    }

    .admin-login-form input {
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .admin-login-form input:focus {
      outline: none;
      border-color: #2E7D5C;
      box-shadow: 0 0 0 3px rgba(46, 125, 92, 0.1);
    }

    .admin-login-form .button {
      width: 100%;
      margin-top: 1rem;
    }

    @media (max-width: 480px) {
      .admin-login-card {
        padding: 2rem 1.5rem;
      }

      .admin-login-brand img {
        width: 48px;
        height: 48px;
      }

      .admin-login-card h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body class="admin-auth-body">
  <main class="admin-page">
    <section class="admin-login-card">
      <div class="admin-login-brand">
        <img src="/images/logo.jpeg" alt="Hillfort Matriculation Higher Secondary School logo" />
        <div class="admin-login-brand-text">
          <strong>Hillfort Matriculation Higher Secondary School</strong>
          <span>Admin Login</span>
        </div>
      </div>
      <span class="eyebrow">Admin Access</span>
      <h1>Control Panel</h1>    
      <p class="admin-error" data-login-error hidden>Invalid credentials. Please try again.</p>

      <form class="admin-login-form" action="/api/admin/login" method="POST">
        <label>
          Username
          <input type="text" name="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button class="button button-primary" type="submit">Sign In</button>
      </form>
    </section>
  </main>

  <script src="/js/admin-login.js"></script>
</body>
</html>
